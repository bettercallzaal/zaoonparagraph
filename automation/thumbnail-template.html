<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 628px; overflow: hidden; }
  .wrap {
    position: relative;
    width: 1200px;
    height: 628px;
    background-image: url('__BG_IMAGE__');
    background-size: cover;
    background-position: center;
  }
  .day-text {
    position: absolute;
    left: 50%;
    top: __TOP_PERCENT__%;
    transform: translate(-50%, -50%);
    font-family: Georgia, 'Times New Roman', serif;
    font-weight: 900;
    font-size: __FONT_SIZE__px;
    color: #d0342c;
    -webkit-text-stroke: 3px #f2e9d8;
    text-align: center;
    white-space: nowrap;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="day-text">DAY __DAY_NUMBER__</div>
  </div>
</body>
</html>
